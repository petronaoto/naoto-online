<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>naoto.online | Journey Archive</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1d1d1f;
            --accent: #0066cc;
            --bg: #ffffff;
            --card-bg: #f5f5f7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        .hero {
            height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
            background: linear-gradient(rgba(255,255,255,0.1), rgba(255,255,255,0.1)), 
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=1920&q=80'); /* 仮の壮大な風景 */
            background-size: cover;
            background-position: center;
        }
        .hero h1 { font-size: 3.5rem; font-weight: 700; margin-bottom: 15px; letter-spacing: -0.03em; }
        .hero p { font-size: 1.25rem; color: #515154; max-width: 600px; }

        .container { max-width: 1100px; margin: -100px auto 100px; padding: 0 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover { transform: scale(1.02); }
        .card-img { height: 240px; background-size: cover; background-position: center; }
        .card-content { padding: 30px; }
        .card-content h2 { font-size: 1.5rem; margin-bottom: 10px; }
        .card-content p { color: #86868b; font-size: 0.95rem; margin-bottom: 20px; }
        .card-link { color: var(--accent); font-weight: 600; font-size: 0.9rem; }

        footer { text-align: center; padding: 100px 20px; color: #86868b; font-size: 0.85rem; }

        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .container { margin-top: -50px; }
        }
    </style>
</head>
